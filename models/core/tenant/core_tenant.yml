models:
  - name: core_tenant_account
    description: "A dbt model for tenant account"
    columns:
      - name: id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null
      - name: tenant_type
        description: "The type of the tenant"
        data_tests:
          - not_null:
              config:
                where: "status <> 'DELETED'"
      - name: status
        description: "The status of the tenant"
        data_tests:
          - not_null
      - name: tenant_origin
        description: "The origin of the tenant"
        data_tests:
          - not_null
      - name: created_at
        description: "The creation date of the tenant"
        data_tests:
          - not_null

  - name: core_tenant_document
    description: "A dbt model aggregating tenant documents by category and completion status"
    columns:
      - name: tenant_id
        description: "The tenant identifier"
        data_tests:
          - unique
          - not_null
      - name: nb_identification_documents
        description: "Number of identification documents uploaded by the tenant"
      - name: identification_sub_category
        description: "Latest identification document sub-category for the tenant"
      - name: identification_document_status
        description: "Latest identification document status for the tenant"
      - name: nb_financial_documents
        description: "Number of financial documents uploaded by the tenant"
      - name: financial_sub_category
        description: "Latest financial document sub-category for the tenant"
      - name: financial_document_status
        description: "Latest financial document status for the tenant"
      - name: nb_residency_documents
        description: "Number of residency documents uploaded by the tenant"
      - name: residency_sub_category
        description: "Latest residency document sub-category for the tenant"
      - name: residency_document_status
        description: "Latest residency document status for the tenant"
      - name: nb_professional_documents
        description: "Number of professional documents uploaded by the tenant"
      - name: professional_sub_category
        description: "Latest professional document sub-category for the tenant"
      - name: professional_document_status
        description: "Latest professional document status for the tenant"
      - name: nb_tax_documents
        description: "Number of tax documents uploaded by the tenant"
      - name: tax_sub_category
        description: "Latest tax document sub-category for the tenant"
      - name: tax_document_status
        description: "Latest tax document status for the tenant"
      - name: monthly_net_income
        description: "Total monthly net income summed across tenant documents"
      - name: has_identification_document
        description: "Flag indicating whether the tenant has at least one identification document"
      - name: has_financial_document
        description: "Flag indicating whether the tenant has at least one financial document"
      - name: has_residency_document
        description: "Flag indicating whether the tenant has at least one residency document"
      - name: has_professional_document
        description: "Flag indicating whether the tenant has at least one professional document"
      - name: has_tax_document
        description: "Flag indicating whether the tenant has at least one tax document"
      - name: document_completion_flag
        description: "Flag indicating whether all required document categories are present"
